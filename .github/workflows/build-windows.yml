name: Build Windows

# Build-validation CI for the Windows media player: compiles the app on every PR
# and push to main to catch breakage early. Mirrors the sibling demos'
# build-windows.yml dependency setup (same Vulkan SDK action + version, msvc-dev-cmd)
# but stops at the app build — installer + release-on-tag packaging is deferred until
# this demo's distribution is wired (see README "Distribution").

on:
  pull_request: {}
  push:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Vulkan SDK
        # Same action + version the runtime, Leia plug-in, and sibling demos pin.
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.283.0
          cache: true

      # Puts cl/link on PATH so the Ninja generator finds the MSVC toolchain.
      - uses: ilammy/msvc-dev-cmd@v1

      - name: Fetch FFmpeg dev libraries
        shell: pwsh
        run: |
          # No pkg-config on the MSVC toolchain; grab a prebuilt LGPL shared dev tree
          # (headers + import libs + DLLs) and point CMake at it via FFMPEG_ROOT,
          # exactly as the local Windows build does.
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-lgpl-shared.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_dl -Force
          $root = (Get-ChildItem ffmpeg_dl -Directory | Select-Object -First 1).FullName
          "FFMPEG_ROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "FFMPEG_ROOT=$root"

      - name: Configure
        shell: pwsh
        # OpenXR loader + SDL3 are fetched from source by CMake (FetchContent).
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DFFMPEG_ROOT="$env:FFMPEG_ROOT"

      - name: Build
        shell: pwsh
        run: cmake --build build

      - name: Sanity-check artifacts
        shell: pwsh
        run: |
          # Ninja (single-config) drops the exe in build/. The exe plus its staged
          # runtime DLLs must all be present — this also exercises the POST_BUILD
          # DLL staging (FFmpeg shared libs + SDL3) the CMake build performs.
          $bindir = "build"
          if (-not (Test-Path "$bindir/mediaplayer_handle_vk_win.exe")) {
            Write-Host "::error::mediaplayer_handle_vk_win.exe not produced"; exit 1
          }
          foreach ($pat in @("avcodec-*.dll","avformat-*.dll","avutil-*.dll","swscale-*.dll","SDL3.dll")) {
            if (-not (Get-ChildItem $bindir -Filter $pat -ErrorAction SilentlyContinue)) {
              Write-Host "::error::missing staged runtime DLL: $pat"; exit 1
            }
          }
          Write-Host "PASS: exe + staged runtime DLLs present."
