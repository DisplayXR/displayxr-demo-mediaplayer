name: Build Windows

# Builds the Windows media player + NSIS installer. PR + push-to-main runs are
# validation only (compile app + installer, assert the payload). On a v* tag push
# the installer is attached to the GitHub Release and the runtime's versions.json
# is bumped. Mirrors the sibling demos' build-windows.yml.
#
# The DetectChanges job + docs_only step gating let this workflow be a required
# status check (the "Build Windows" job always runs and reports success in ~30s
# on doc-only PRs, skipping the heavy build) without blocking doc PRs. Mirrors
# the sentinel pattern in displayxr-runtime + displayxr-leia-plugin.

on:
  pull_request: {}
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# contents: write lets softprops/action-gh-release create/update the Release on tags.
permissions:
  contents: write

jobs:
  DetectChanges:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
          else
            BASE=${{ github.event.before }}
          fi
          CHANGED=$(git diff --name-only "$BASE" HEAD)
          NON_DOC=$(echo "$CHANGED" | grep -vE '^(docs/|.*\.md$|LICENSE$|\.github/ISSUE_TEMPLATE/)' || true)
          if [ -n "$CHANGED" ] && [ -z "$NON_DOC" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  Build:
    name: Build Windows
    needs: DetectChanges
    runs-on: windows-2022
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5

      - name: Doc-only PR — skipping heavy build steps
        if: needs.DetectChanges.outputs.docs_only == 'true'
        run: echo "docs_only=true; build steps will skip and report success."

      - name: Install Vulkan SDK
        if: needs.DetectChanges.outputs.docs_only != 'true'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.283.0
          cache: true

      - if: needs.DetectChanges.outputs.docs_only != 'true'
        uses: ilammy/msvc-dev-cmd@v1

      # Build a slim, DECODE-ONLY FFmpeg (scripts/build-ffmpeg-slim.sh) instead of
      # downloading a stock full build. A stereo player only decodes, so this strips
      # every encoder + external lib a full build statically links — cutting the
      # bundled FFmpeg DLLs from ~103 MB to ~9 MB (installer ~46 MB -> ~12 MB).
      # Cached by the pinned FFmpeg commit + the build script, so it builds once.
      - name: Slim FFmpeg — set vars
        if: needs.DetectChanges.outputs.docs_only != 'true'
        shell: pwsh
        run: |
          # FFmpeg 8.x: sonames avcodec-62 / avformat-62 / avutil-60 / swscale-9 / swresample-6.
          $sha = "e8031e5b9ad2def2a8ff51ca674f708812a7ec29"
          $prefix = "$env:RUNNER_TEMP\ffmpeg-slim"
          "FFMPEG_SHA=$sha"       | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "FFMPEG_PREFIX=$prefix" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "FFMPEG_ROOT=$prefix"   | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Cache slim FFmpeg
        if: needs.DetectChanges.outputs.docs_only != 'true'
        id: ffmpeg-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.FFMPEG_PREFIX }}
          key: ffmpeg-slim-${{ env.FFMPEG_SHA }}-${{ hashFiles('scripts/build-ffmpeg-slim.sh') }}

      - name: Build slim FFmpeg (on cache miss)
        if: needs.DetectChanges.outputs.docs_only != 'true' && steps.ffmpeg-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          choco install nasm -y --no-progress
          $env:PATH = "C:\Program Files\NASM;$env:PATH"
          # GNU make for FFmpeg's build system (MSYS2 is preinstalled at C:\msys64).
          C:\msys64\usr\bin\bash.exe -lc "pacman -Sy --noconfirm --needed make diffutils"
          # FFmpeg source at the pinned commit (GitHub allows fetch-by-sha).
          $src = "$env:RUNNER_TEMP\ffmpeg-src"
          git init $src
          git -C $src remote add origin https://github.com/FFmpeg/FFmpeg.git
          git -C $src fetch --depth 1 origin $env:FFMPEG_SHA
          git -C $src checkout FETCH_HEAD
          # Build under MSYS2 bash, inheriting this step's MSVC env (from
          # msvc-dev-cmd) + nasm. The script puts the MSVC tools dir first so its
          # cl.exe/link.exe win over MSYS2's /usr/bin/link.exe.
          $env:MSYS2_PATH_TYPE = "inherit"
          $srcU    = (& C:\msys64\usr\bin\cygpath.exe -u "$src").Trim()
          $prefixU = (& C:\msys64\usr\bin\cygpath.exe -u "$env:FFMPEG_PREFIX").Trim()
          $scriptU = (& C:\msys64\usr\bin\cygpath.exe -u "$PWD\scripts\build-ffmpeg-slim.sh").Trim()
          C:\msys64\usr\bin\bash.exe -lc "FFMPEG_SRC='$srcU' FFMPEG_PREFIX='$prefixU' bash '$scriptU'"
          if ($LASTEXITCODE -ne 0) { Write-Host '::error::slim FFmpeg build failed'; exit 1 }

      - name: Configure + build
        if: needs.DetectChanges.outputs.docs_only != 'true'
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DFFMPEG_ROOT="$env:FFMPEG_ROOT"
          cmake --build build

      - name: Sanity-check app artifacts
        if: needs.DetectChanges.outputs.docs_only != 'true'
        shell: pwsh
        run: |
          if (-not (Test-Path "build/mediaplayer_handle_vk_win.exe")) {
            Write-Host "::error::mediaplayer_handle_vk_win.exe not produced"; exit 1 }
          foreach ($pat in @("avcodec-*.dll","avformat-*.dll","avutil-*.dll","swscale-*.dll","SDL3.dll")) {
            if (-not (Get-ChildItem build -Filter $pat -ErrorAction SilentlyContinue)) {
              Write-Host "::error::missing staged runtime DLL: $pat"; exit 1 } }
          Write-Host "PASS: exe + staged runtime DLLs present."

      - name: Derive installer version
        if: needs.DetectChanges.outputs.docs_only != 'true'
        id: version
        shell: pwsh
        run: |
          # v1.2.3 -> 1.2.3 for the installer filename + VIProductVersion. Untagged
          # builds use 0.0.0 (valid version; never published).
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $version = $env:GITHUB_REF -replace '^refs/tags/v',''
          } else { $version = "0.0.0" }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "VERSION=$version"

      - name: Build installer
        if: needs.DetectChanges.outputs.docs_only != 'true'
        shell: cmd
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: call installer\build-installer.bat

      - name: Assert installer payload (regression guard)
        if: needs.DetectChanges.outputs.docs_only != 'true'
        shell: pwsh
        run: |
          $exe = Get-ChildItem installer\DisplayXRMediaPlayerSetup-*.exe | Select-Object -First 1
          if (-not $exe) { Write-Host "::error::installer .exe not produced"; exit 1 }
          Write-Host "Installer: $($exe.FullName)"
          # 7-Zip (preinstalled on the runner) lists the NSIS payload.
          $listing = & 7z l "$($exe.FullName)" 2>&1 | Out-String
          # Vendor-neutral: must never bundle a SimulatedReality* DLL (that's the
          # Leia plug-in's concern). Mirrors the sibling demos' guard.
          if ($listing -match 'SimulatedReality') {
            Write-Host "::error::installer bundles a SimulatedReality* DLL — vendor-neutral demos must not."; exit 1 }
          foreach ($need in @("mediaplayer_handle_vk_win.exe","SDL3.dll","avcodec","avformat","avutil","swscale","swresample")) {
            if ($listing -notmatch [regex]::Escape($need)) {
              Write-Host "::error::installer payload missing $need"; exit 1 } }
          Write-Host "PASS: installer payload OK (app + SDL3 + FFmpeg, no vendor SR DLL)."

      - name: Upload installer
        if: needs.DetectChanges.outputs.docs_only != 'true'
        uses: actions/upload-artifact@v6
        with:
          retention-days: 3
          name: DisplayXRMediaPlayer-Windows
          if-no-files-found: error
          path: installer/DisplayXRMediaPlayerSetup-*.exe

      - name: Attach installer to GitHub release on tag
        if: needs.DetectChanges.outputs.docs_only != 'true' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: installer/DisplayXRMediaPlayerSetup-*.exe
          fail_on_unmatched_files: true
          draft: false
          prerelease: false

  # On v* tag push, after Build succeeds, ask displayxr-runtime to bump
  # versions.json[mediaplayer_demo] to this tag. Only the Windows workflow
  # dispatches (the macOS one racing the same tag would just no-op).
  DispatchVersionsBump:
    if: ${{ startsWith(github.ref, 'refs/tags/v') && github.repository == 'DisplayXR/displayxr-demo-mediaplayer' }}
    needs: [Build]
    runs-on: ubuntu-latest
    steps:
      - name: Mint dispatch token
        id: dispatch-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.DISPLAYXR_APP_ID }}
          private-key: ${{ secrets.DISPLAYXR_APP_PRIVATE_KEY }}
          owner: DisplayXR
          repositories: displayxr-runtime

      - name: Dispatch versions.json bump
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ steps.dispatch-token.outputs.token }}
          repository: DisplayXR/displayxr-runtime
          event-type: versions-bump
          client-payload: |
            {
              "field":       "mediaplayer_demo",
              "tag":         "${{ github.ref_name }}",
              "source_repo": "${{ github.repository }}"
            }
