name: Build macOS

# Builds the macOS media player + .pkg installer. PR + push-to-main runs are
# validation only (build app + .pkg, assert the bundle payload). On a v* tag push
# the .pkg is attached to the GitHub Release. Mirrors the sibling demos'
# build-macos.yml. (versions.json is bumped by the Windows workflow only.)
#
# The DetectChanges job + docs_only step gating let this workflow be a required
# status check (the "Build macOS" job always runs and reports success in ~30s
# on doc-only PRs, skipping the heavy build) without blocking doc PRs. Mirrors
# the sentinel pattern in displayxr-runtime + displayxr-leia-plugin.

on:
  pull_request: {}
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  DetectChanges:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
          else
            BASE=${{ github.event.before }}
          fi
          CHANGED=$(git diff --name-only "$BASE" HEAD)
          NON_DOC=$(echo "$CHANGED" | grep -vE '^(docs/|.*\.md$|LICENSE$|\.github/ISSUE_TEMPLATE/)' || true)
          if [ -n "$CHANGED" ] && [ -z "$NON_DOC" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  Build:
    name: Build macOS
    needs: DetectChanges
    runs-on: macos-14
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Doc-only PR — skipping heavy build steps
        if: needs.DetectChanges.outputs.docs_only == 'true'
        run: echo "docs_only=true; build steps will skip and report success."

      - name: Install dependencies
        if: needs.DetectChanges.outputs.docs_only != 'true'
        # OpenXR loader is built from source by scripts/build_macos.sh (no brew
        # formula). FFmpeg via Homebrew (pkg-config). The app's dylib closure is
        # bundled by a recursive otool/install_name_tool walk in create_app_bundle.sh.
        run: |
          brew install cmake ninja ffmpeg pkg-config vulkan-headers vulkan-loader molten-vk
          echo "VULKAN_SDK=$(brew --prefix)" >> "$GITHUB_ENV"

      - name: Derive installer version
        if: needs.DetectChanges.outputs.docs_only != 'true'
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev.${GITHUB_SHA::8}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION"

      - name: Build demo + installer
        if: needs.DetectChanges.outputs.docs_only != 'true'
        env:
          DISPLAYXR_VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/build_macos.sh --installer

      - name: Assert .pkg payload (regression guard)
        if: needs.DetectChanges.outputs.docs_only != 'true'
        run: |
          set -euo pipefail
          PKG=$(find _package -maxdepth 1 -name "DisplayXRMediaPlayer-*.pkg" -type f | head -1)
          if [ -z "$PKG" ] || [ ! -f "$PKG" ]; then
            echo "::error::DisplayXRMediaPlayer-*.pkg missing from _package/"; ls -la _package/ || true; exit 1
          fi
          echo "Found installer: $PKG"
          EXPAND_DIR=$(mktemp -d)
          pkgutil --expand "$PKG" "$EXPAND_DIR/expand"
          PAYLOAD="$EXPAND_DIR/expand/mediaplayer.pkg/Payload"
          if [ ! -f "$PAYLOAD" ]; then
            echo "::error::mediaplayer.pkg/Payload not found inside .pkg"; ls -la "$EXPAND_DIR/expand/" || true; exit 1
          fi
          gunzip -c "$PAYLOAD" | cpio -i -t > "$EXPAND_DIR/files" 2>/dev/null

          MISSING=0
          assert_present() {
            if ! grep -q "$1" "$EXPAND_DIR/files"; then
              echo "::error::$2 missing from .pkg payload (pattern: $1)"; MISSING=1
            fi
          }
          APP='Applications/Stereo Media Player\.app/Contents'
          assert_present "$APP/MacOS/Stereo Media Player" "launcher"
          assert_present "$APP/Resources/mediaplayer_handle_vk_macos" "demo binary"
          assert_present "$APP/Resources/lib/libMoltenVK" "MoltenVK"
          assert_present "$APP/Resources/lib/libvulkan" "Vulkan loader"
          assert_present "$APP/Resources/lib/libopenxr_loader" "OpenXR loader"
          assert_present "$APP/Resources/lib/libavcodec" "FFmpeg avcodec"
          assert_present "$APP/Resources/lib/libavformat" "FFmpeg avformat"
          if [ "$MISSING" -ne 0 ]; then echo "Payload listing:"; cat "$EXPAND_DIR/files"; exit 1; fi
          echo "PASS: .pkg payload contains app + MoltenVK/Vulkan/OpenXR + FFmpeg dylibs."

      - name: Upload installer
        if: needs.DetectChanges.outputs.docs_only != 'true'
        uses: actions/upload-artifact@v4
        with:
          retention-days: 3
          name: DisplayXRMediaPlayer-macOS
          if-no-files-found: error
          path: _package/DisplayXRMediaPlayer-*.pkg

      - name: Attach .pkg to GitHub release on tag
        if: needs.DetectChanges.outputs.docs_only != 'true' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: _package/DisplayXRMediaPlayer-*.pkg
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
